name: Scheduled PR Merge and Cleanup

on:
  schedule:
    # 12:15 AM Hora Venezuela (UTC-4). 
    - cron: '15 4 * * *' 
  workflow_dispatch: 

jobs:
  merge-and-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Configure Exercism CLI
        env:
          EXERCISM_TOKEN: ${{ secrets.EXERCISM_TOKEN }}
        run: |
          curl -L https://github.com/exercism/cli/releases/download/v3.5.4/exercism-3.5.4-linux-x86_64.tar.gz -o exercism.tar.gz
          tar -xf exercism.tar.gz
          sudo mv exercism /usr/local/bin/
          mkdir -p /home/runner/.config/exercism
          exercism configure --token=$EXERCISM_TOKEN

      - name: Auto-enrich and Merge Exercism PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener lista de PRs abiertos
          PR_LIST=$(gh pr list --state open --json number --jq '.[].number')

          if [ -z "$PR_LIST" ]; then
            echo "No hay Pull Requests pendientes. Sistema en reposo."
            exit 0
          fi

          # Configuración global de Git para el bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for pr in $PR_LIST; do
            echo "--- Procesando PR #$pr ---"
            
            # Asegurar que empezamos desde main limpio en cada iteración
            git checkout main
            git pull origin main

            # 2. Checkout de la rama del PR
            if ! gh pr checkout $pr; then
              echo "Error: No se pudo acceder al PR #$pr. Saltando..."
              continue
            fi

            # 3. Identificación de rutas (solutions/track/slug)
            SAMPLE_FILE=$(gh pr view $pr --json files --jq '.[0].path')
            TRACK=$(echo "$SAMPLE_FILE" | cut -d'/' -f2)
            SLUG=$(echo "$SAMPLE_FILE" | cut -d'/' -f3)
            BASE_PATH="solutions/$TRACK/$SLUG"

            echo "Detección: [$TRACK] -> [$SLUG]"

            # 4. Descarga de técnica y Enriquecimiento
            # Solo procesar al merge si la descarga es exitosa
            if exercism download --track=$TRACK --exercise=$SLUG; then
              SOURCE_DIR="$HOME/exercism/$TRACK/$SLUG"
              
              if [ -d "$SOURCE_DIR" ]; then
                cp -ru "$SOURCE_DIR"/. "./$BASE_PATH/"
                rm -f "./$BASE_PATH/.exercism/config.json"

                # 5. Intentar commit y push
                git add .
                if git commit -m "chore: inyectando tests y docs para $SLUG"; then
                  git push origin HEAD
                  echo "Cambios inyectados exitosamente."
                else
                  echo "No hubo cambios nuevos que añadir."
                fi

                # 6. Merge Final
                gh pr merge $pr --squash --delete-branch --admin
                echo "PR #$pr mergeado y cerrado."
              fi
            else
              echo "Error al descargar de Exercism. Se mantiene #$pr abierto para revisión."
            fi
          done

          # Regresar a main al finalizar
          git checkout main
