name: Scheduled PR Merge and Cleanup

on:
  schedule:
    - cron: '15 3 * * *' 
  workflow_dispatch: 

jobs:
  merge-and-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Configure Exercism CLI
        env:
          EXERCISM_TOKEN: ${{ secrets.EXERCISM_TOKEN }}
        run: |
          curl -L https://github.com/exercism/cli/releases/download/v3.5.4/exercism-3.5.4-linux-x86_64.tar.gz -o exercism.tar.gz
          tar -xf exercism.tar.gz
          sudo mv exercism /usr/local/bin/
          mkdir -p /home/runner/.config/exercism
          exercism configure --token=$EXERCISM_TOKEN

      - name: Auto-enrich and Merge Exercism PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener lista de PRs e invertirla para procesar de más antiguo a más reciente
          PR_LIST=$(gh pr list --state open --json number --jq '.[].number | @text' | tac)

          if [ -z "$PR_LIST" ]; then
            echo "No hay Pull Requests pendientes. Sistema en reposo."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for pr in $PR_LIST; do
            echo "::group::Procesando PR #$pr"
            
            git checkout main
            git pull origin main

            # 2. Checkout de la rama del PR
            if ! gh pr checkout $pr; then
              echo "::error:: No se pudo acceder al PR #$pr. Saltando..."
              echo "::endgroup::"
              continue
            fi

            # 3. Identificación de rutas (solutions/track/slug)
            SAMPLE_FILE=$(gh pr view $pr --json files --jq '.files[0].path')
            
            if [ -z "$SAMPLE_FILE" ] || [ "$SAMPLE_FILE" == "null" ]; then
              echo "::warning:: No se detectaron archivos en PR #$pr. Saltando..."
              echo "::endgroup::"
              continue
            fi

            TRACK=$(echo "$SAMPLE_FILE" | cut -d'/' -f2)
            SLUG=$(echo "$SAMPLE_FILE" | cut -d'/' -f3)
            BASE_PATH="solutions/$TRACK/$SLUG"

            echo "Detección: Track [$TRACK] -> Slug [$SLUG]"

            # 4. Limpieza de entorno temporal
            rm -rf "$HOME/exercism/$TRACK/$SLUG"
            
            # Descarga estándar (sin --force)
            if exercism download --track=$TRACK --exercise=$SLUG; then
              SOURCE_DIR="$HOME/exercism/$TRACK/$SLUG"
              
              if [ -d "$SOURCE_DIR" ]; then
                mkdir -p "./$BASE_PATH/"
                
                # Sincronización por Integridad:
                cp -ru "$SOURCE_DIR"/. "./$BASE_PATH/"
                rm -f "./$BASE_PATH/.exercism/config.json"

                # 5. Commit y Push
                git add .
                if git commit -m "chore: enriquecimiento de biomasa para $SLUG (PR #$pr)"; then
                  git push origin HEAD
                  echo "Cambios inyectados. Esperando validación de GitHub..."
                  sleep 15
                else
                  echo "No hay cambios nuevos"
                fi

                # 6. Merge Final
                if gh pr merge $pr --squash --delete-branch --admin; then
                  echo "PR #$pr mergeado con éxito."
                else
                  echo "::error:: PR #$pr no mergeable tras inyección."
                fi
              fi
            else
              echo "::error:: Falló la descarga de Exercism para $SLUG."
            fi
            echo "::endgroup::"
          done

          git checkout main
